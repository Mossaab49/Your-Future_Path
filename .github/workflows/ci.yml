name: CI pipeline

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest
  
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      
      mongo:
        image: mongo:latest
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongo --eval 'db.runCommand({ ping: 1 })'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    
    steps:
      -name: Checkout code
       uses: actions/checkout@v3

      -name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      -name: Install dependencies
        run: npm ci

      -name: Create .env file
        run: |
          echo "NODE_ENV=test" >> .env
          echo "PORT=3000" >> .env
          echo "DATABASE_URL=postgresql://postgres:password@localhost:5432/test_db" >> .env
          echo "MONGO_URL=mongodb://localhost:27017/test_db" >> .env
          echo "JWT_SECRET=secret_test" >> .env
          echo "JWT_EXPIRES_IN=1d" >> .env

      # -name: Run Prisma migrations
      #   run: npx prisma migrate deploy
      
      # -name: Run tests
      #   run: npm test

      # -name: Build Docker image
      #   run: docker build -t Your-Future-Path .